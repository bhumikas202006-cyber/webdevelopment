<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: sans-serif;
            text-align: center;
        }
        .piano{
            display: flex;
            justify-content: center;
            margin-top: 50px;

        }
        .key{
            border:1px solid black;
            width: 60px;
            height: 200px;
            margin:  2px;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: background-color 0.3s;
            
        }
        .key:active{
            background-color: rgb(134, 113, 113);
        }
       


    </style>
</head>
<body>

    <h1>piano - events</h1>

    <div class="piano">

        <div class="key" data-note="C">C</div>
        <div class="key" data-note="D">D</div>
        <div class="key" data-note="E">E</div>
        <div class="key" data-note="F">F</div>
        <div class="key" data-note="G">G</div>
        <div class="key" data-note="A">A</div>
        <div class="key" data-note="B">B</div>

    </div>
    <audio id="audio-C" src="./freesound_community-mi-80239 (1).mp3""></audio>
    <audio id="audio-D" src="./freesound_community-mi-80239 (1).mp3"></audio>
    <audio id="audio-E" src="./freesound_community-la-80237.mp3"></audio>
    <audio id="audio-F" src="./freesound_community-mi-80239 (1).mp3"></audio>
    <audio id="audio-G" src="./freesound_community-piano-g-6200.mp3"></audio>
    <audio id="audio-A" src="./u_df365hdxp7-cinematic-piano-note-362716.mp3"></audio>
    <audio id="audio-B" src="./freesound_community-sol-101774.mp3"></audio>

    <script>
        const keys = document.querySelectorAll(".key")
        console.log(keys)

        //keys will be an array bcz its multiple div container
//b is parameter for each key in the array
        
        keys.forEach(function(b){
            const note = b.getAttribute("data-note")
            const audio = document.getElementById("audio-"+note)

            b.addEventListener("click", function(){
                audio.currentTime = 0
                audio.play()
            })
        })





    </script>
    
</body>
</html>
