<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #mydiv{
            width: 200px;
            height: 200px;
            background-color: aqua;
            overflow: auto;
        }
     
        .content{
           height: 300px;

        }

    </style>
</head>
<body>
    <h1>welcome to events</h1>

    <input id="myinput" placeholder="type scanner">

    <div id="mydiv">
        <div class="content">scroll inside mee
        </div>
    </div>

    <script>
      const input = document.querySelector("#myinput");
      const div = document.querySelector("#mydiv");

//mouseover

       function handleMouseOver(){
          div.style.backgroundColor = "red"
       }

       div.addEventListener('mouseover',handleMouseOver)

       function handleMouseOut(){
          div.style.backgroundColor = "yellow"
       }

       div.addEventListener('mouseout',handleMouseOut)
     

       //scroll

       div.addEventListener('scroll',function(){
        console.log("scrolled")
       })

       //keyboard    //.key - will help to capture a single key pressed on the keyboard
       //01. keyup - key released output

    //    function handleKeyUp(e){
    //     console.log('key released'+ e.key)
    //    }

    //    input.addEventListener('keyup',handleKeyUp)

    //    //keydown - key pressed output

    //    function handleKeyDown(e){
    //     console.log('key pressed'+ e.key)
    //    }

    //    input.addEventListener('keydown',handleKeyDown)

       //change - when input value changes
       //.value - will help to capture the entire value of the input 

       function handleChange(x){
        console.log('value changed '+ x.target.value)
       }

       input.addEventListener('change',handleChange)

    </script>
</body>
</html>
