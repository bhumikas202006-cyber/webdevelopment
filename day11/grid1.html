<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .products{
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            background-color: lime;
            padding: 10px;
        }
        .box{
            background-color: lightblue;
            border: 1px solid black;
            padding: 20px;
            text-align: center;
        }
        
    </style>
</head>
<div>
    <div class="products">

    <div class="box">cake</div>
    <div class="box">cookie</div>
    <div class="box">brownie</div>
    <div class="box">cupcake</div>
    <div class="box">donut</div>
    <div class="box">muffin</div>


</div>
</body>
</html>
