<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: black;
            color:aliceblue;
            font-family: Arial;
        }
        .title{
            text-align: center;
            color: blue;
        }
        .player{
            display: block;
            background:#222;
            padding: 20px;
            border: 1px solid white;
            border-radius: 10px;
            margin-top: 5px;
        }
        .badges{
            display: inline;
            background: orange;
            color: black;
            padding: 5px;
            margin-right :50px;
            border-radius: 20px;
        }
        .secretmessage{
            display: none;
        }
        .game-container{
          display:flex;
          justify-content: center;
          gap: 20px;
          margin-top: 20px;
        }
        .gamecard{
            background: #222;
            padding: 20px;
            width: 200px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1 class="title">Game Zone</h1>
    <div class="player card">
        <h2> player:ninja</h2>
        <p>level:99</p>
    </div>
    <div class="badges">
        <span class="badge">pro</span>
        <span class="badge">fast</span>
        <span class="badge">leader</span>
    </div>
    <div class="secretmessage">
        secret weapon
    </div>
    <div class="game-container">
        <div class="gamecard">
            <h3>minecraft</h3>
            <p>building adventure</p>
        </div>
        <div class="gamecard">
            <h3>FIFA</h3>
            <p>football fun</p>
        </div>
        <div class="gamecard">
            <h3>freefire</h3>
            <p>shooting battle</p>
        </div>
    </div>
</body>
</html>
