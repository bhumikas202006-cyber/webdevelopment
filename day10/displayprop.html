<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .hidden{
            color: red;
            display: none;
        }
        .hidden2{
            background-color: aqua ;
            display: block;
        }
        .hidden3{
            background-color: yellow;
            display: inline;
        }
    </style>
</head>
<body>
    <div>
        display:none-means to show nothing / simply hide the content
        <p class="hidden">hello display none</p>
        <div>
        display:block-means to show the content as a block element
        <p class="hidden2">hello display block</p>
        </div>
    </div>
    <div>
        display:inline-means similar to span tag bcz it takes required amount of width
        <p class="hidden3">hello display inline</p>
    </div>
</body>
</html>
