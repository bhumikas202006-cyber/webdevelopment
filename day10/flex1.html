<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .products{
            background-color: rgb(195, 161, 227);
            height: 500px;
            display: flex;
            justify-content:center;
            gap: 20px;
            align-items: center;
        }
        .box{
            border: 1px solid black;
            width: 100px;
            height: 100px;
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <div class="products">
        <div class="box">
            <h2>cake</h2>
            <p>honey cake</p>
        </div>
        <div class="box">
            <h2>cookies</h2>
            <p>chocolate chip cookies</p>
        </div>
        <div class="box">
            <h2>chocolate</h2>
            <p>dark chocolate</p>
        </div>
    </div>
</body>
</html>
