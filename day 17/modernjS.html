<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //01.templete string - variables or parameter along with text

       var a = "bhumi"
       //old way
       console.log("my name is ",a)

       //new way - ${variable/parameter}
       console.log(`my name is  ${a} ` )

       //02.arrow fun - function logic in one line

       //old way - function
       function abc(){

        console.log("hello arrow  function")
       }
       abc()
       
       //new way
        var xyz = ()=>{
        console.log("hello arrow function")
       }
       xyz()


    </script>
</body>
</html>
