<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    

<script>
//task print number 1 to 10
//console.log(1)


//for(starting point; ending/condition; == or --)

//print from 1 to 10 

for(let i=1;i<=10;i++){
    console.log(i);
}

//print from 10 to 1

for(let y=10;y>=1;y--){
    console.log(y);
}

//while loop - entry controller loop

let count=1
while(count<=5){
    console.log("hello i am while loop")
    count++
}
</script>



</body>
</html>
